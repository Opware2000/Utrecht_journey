<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utrecht City Tour 🇳🇱</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Abstract Background Pattern -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <header class="hero">
        <div class="starry-night-bg" id="starry-bg"></div>
        <div class="starry-night-overlay"></div>
        <div class="hero-content reveal glass-panel">
            <h1 class="title">Discover <span class="gradient-text">Utrecht</span></h1>
            <p class="subtitle">A Journey Through Time, Art, and Culture 🇳🇱</p>
            <div class="hero-actions">
                <a href="#map-section" class="btn btn-primary">Start Exploring</a>
                <a href="https://www.google.com/maps/@/data=!3m1!4b1!4m3!11m2!2sX_oY9OAzdtKSrfJGu0ixqQ!3e3" target="_blank" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
                    Open Google Maps Route
                </a>
            </div>
        </div>
    </header>

    <main>
        <section id="map-section" class="map-container reveal">
            <h2 class="section-title">Our Route Map</h2>
            <div class="glass-panel">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d39268.45524316279!2d5.08868!3d52.090737!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c66f4339d32d37%3A0xd6c8fc4c19af4ae9!2sUtrecht%2C%20Netherlands!5e0!3m2!1sen!2sfr!4v1710200000000!5m2!1sen!2sfr" 
                    width="100%" 
                    height="480" 
                    style="border:0; border-radius: 12px; filter: invert(90%) hue-rotate(180deg);" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>

        <section id="timeline" class="timeline">
            <!-- Items injected by JS -->
        </section>
    </main>

    <footer class="glass-panel reveal">
        <p>Utrecht City Tour &copy; 2026</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
