<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utrecht City Tour 🇳🇱</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Abstract Background Pattern -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <header class="hero">
        <div class="starry-night-bg" id="starry-bg"></div>
        <div class="starry-night-overlay"></div>
        <div class="hero-content reveal glass-panel">
            <h1 class="title">Discover <span class="gradient-text">Utrecht</span></h1>
            <p class="subtitle">A Journey Through Time, Art, and Culture 🇳🇱</p>
            <div class="hero-actions">
                <a href="#map-section" class="btn btn-primary">Start Exploring</a>
            </div>
        </div>
    </header>

    <main>
        <section id="map-section" class="map-container reveal">
            <h2 class="section-title">Our Route Map</h2>
            <div class="glass-panel">
                <iframe
                    src="https://www.google.com/maps/d/u/0/embed?mid=11VnqKcMYjkjkuhVObLeS9v0HcHOQRxI&ehbc=2E312F&noprof=1"
                    width="100%" height="480"
                    style="border:0; border-radius: 12px; filter: invert(90%) hue-rotate(180deg);" allowfullscreen=""
                    loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>

        <section id="timeline" class="timeline">
            <!-- Items injected by JS -->
        </section>
    </main>

    <footer class="glass-panel reveal">
        <p>Utrecht City Tour &copy; 2026 - Lycée Pierre Larousse - Toucy - Nicolas Ogier</p>
        <p style="margin-top: 1rem;">
            <a href="https://www.google.com/maps/@/data=!3m1!4b1!4m3!11m2!2sX_oY9OAzdtKSrfJGu0ixqQ!3e3" target="_blank" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">
                Ouvrir l'itinéraire dans Google Maps 🗺️
            </a>
        </p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
